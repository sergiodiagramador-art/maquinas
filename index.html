<!DOCTYPE html>
<html lang='pt-br'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no'>
    <title>AZULÃO NEXT v1.0</title>
    <style>
        body { font-family: sans-serif; background: #003366; margin: 0; color: white; text-align: center; }
        header { background: #002244; padding: 15px; font-weight: bold; border-bottom: 3px solid #ffcc00; font-size: 20px; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 15px; }
        .m { background: #28a745; padding: 25px 2px; border-radius: 8px; font-weight: bold; font-size: 24px; border: 2px solid white; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .m.rua { background: #fd7e14; }
        .m.hosp { background: #ffffff; color: #003366; border: 3px solid #003366; }
        .m.manut { background: #dc3545; }
        .m small { display: block; font-size: 10px; margin-top: 5px; text-transform: uppercase; font-weight: normal; }
        .controls { background: #f8f9fa; padding: 20px; color: #333; position: sticky; bottom: 0; border-top: 2px solid #ddd; }
        select { width: 100%; padding: 15px; font-size: 16px; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body>
    <header>AZULÃO NEXT v1.0</header>
    
    <div id='grid' class='grid'></div>

    <div class='controls'>
        <p style='margin:0 0 10px 0; font-weight:bold;'>ESCOLHA O HOSPITAL ANTES DE CLICAR:</p>
        <select id='h-select'>
            <option value=''>-- SELECIONE AQUI --</option>
            <option>Erasto Gaertner</option><option>Erastinho</option><option>Marcelino</option>
            <option>Nossa Saúde</option><option>Nações</option><option>Pilar</option>
            <option>Trabalhador</option><option>INC Ecoville</option><option>Santa Cruz</option>
            <option>Sugisawa</option><option>Clínicas</option><option>Evangélico</option>
            <option>São Vicente</option><option>IPO</option><option>Vita Batel</option>
        </select>
    </div>

    <script>
        let machines = Array.from({length: 18}, (_, i) => ({id: i+1, s: 'base', h: ''}));
        const states = ['base', 'rua', 'hosp', 'manut'];

        function render() {
            const container = document.getElementById('grid');
            container.innerHTML = machines.map(m => {
                let label = m.h || m.s.toUpperCase();
                return '<div class="m '+m.s+'" onclick="cycle('+m.id+')">'+m.id+'<small>'+label+'</small></div>';
            }).join('');
            localStorage.setItem('azulao_next_v1', JSON.stringify(machines));
        }

        function cycle(id) {
            let m = machines.find(x => x.id === id);
            let currentIdx = states.indexOf(m.s);
            let nextState = states[(currentIdx + 1) % states.length];
            
            if(nextState === 'hosp') {
                let h = document.getElementById('h-select').value;
                if(!h) {
                    alert('POR FAVOR, SELECIONE O HOSPITAL NA LISTA ABAIXO PRIMEIRO!');
                    return;
                }
                m.h = h;
            } else {
                m.h = '';
            }
            
            m.s = nextState;
            render();
        }

        const saved = localStorage.getItem('azulao_next_v1');
        if(saved) machines = JSON.parse(saved);
        render();
    </script>
</body>
</html>
