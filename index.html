<!DOCTYPE html>
<html lang='pt-br'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no'>
    <title>Logística v2.8 - ESTÁVEL</title>
    <style>
        body { font-family: sans-serif; background: #0056b3; margin: 0; padding-bottom: 70px; color: white; text-align: center; overflow: hidden; }
        header { background: #004494; padding: 12px; font-weight: bold; font-size: 18px; border-bottom: 2px solid rgba(255,255,255,0.2); }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 10px; height: 75vh; overflow-y: auto; }
        .card { background: #28a745; color: white; padding: 15px 2px; border-radius: 8px; text-align: center; font-weight: bold; font-size: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.2); position: relative; }
        .card.rua { background: #fd7e14; }
        .card.hosp { background: white; color: #0056b3; border: 2px solid #0056b3; }
        .card.manut { background: #dc3545; }
        .card small { display: block; font-size: 9px; margin-top: 4px; font-weight: normal; text-transform: uppercase; }
        .nav { position: fixed; bottom: 0; width: 100%; background: #fff; display: flex; height: 60px; }
        .nav-btn { flex: 1; border: none; background: none; font-weight: bold; color: #666; font-size: 14px; }
        .nav-btn.active { color: #0056b3; border-top: 4px solid #0056b3; }
        .view { display: none; }
        .view.active { display: block; }
        /* Seletor simplificado para não travar */
        #hosp-selector { display: none; position: fixed; top: 10%; left: 5%; width: 90%; height: 80%; background: white; color: #333; z-index: 100; border-radius: 10px; box-shadow: 0 0 20px rgba(0,0,0,0.5); overflow-y: auto; padding: 10px; }
        .h-option { padding: 15px; border-bottom: 1px solid #eee; text-align: left; font-size: 16px; font-weight: bold; }
    </style>
</head>
<body>
    <header>LOGÍSTICA v2.8</header>
    
    <div id='v-m' class='view active'>
        <div id='grid' class='grid'></div>
    </div>

    <div id='hosp-selector'>
        <h3 style='margin-top:0'>Selecione o Hospital:</h3>
        <div id='options'></div>
        <button onclick='closeHosp()' style='width:100%; padding:15px; background:#dc3545; color:white; border:none; margin-top:10px; border-radius:5px; font-weight:bold;'>CANCELAR</button>
    </div>

    <div class='nav'>
        <button class='nav-btn active'>📦 MÁQUINAS</button>
    </div>

    <script>
        const HOSP = ['Nossa Saúde', 'Nações', 'Erasto', 'Erastinho', 'Pilar', 'Marcelino', 'Trabalhador', 'INC', 'Santa Cruz', 'Sugisawa', 'Clínicas', 'Evangélico', 'São Vicente', 'IPO', 'Vita'];
        const STATES = ['base', 'rua', 'hosp', 'manut'];
        let m_data = Array.from({length: 18}, (_, i) => ({id: i+1, s: 'base', h: ''}));
        let activeId = null;

        function render() {
            document.getElementById('grid').innerHTML = m_data.map(m => 
                '<div class="card '+m.s+'" onclick="nxt('+m.id+')">'+m.id+'<br><small>'+(m.h||m.s.toUpperCase())+'</small></div>'
            ).join('');
            localStorage.setItem('hm_v28', JSON.stringify(m_data));
        }

        function nxt(id) {
            const m = m_data.find(x => x.id === id);
            let idx = STATES.indexOf(m.s);
            let nextS = STATES[(idx + 1) % STATES.length];
            
            if(nextS === 'hosp') {
                activeId = id;
                openHosp();
            } else {
                m.s = nextS;
                m.h = '';
                render();
            }
        }

        function openHosp() {
            const opt = document.getElementById('options');
            opt.innerHTML = HOSP.sort().map(h => '<div class="h-option" onclick="setH(\''+h+'\')">'+h+'</div>').join('');
            document.getElementById('hosp-selector').style.display = 'block';
        }

        function setH(name) {
            const m = m_data.find(x => x.id === activeId);
            m.s = 'hosp';
            m.h = name;
            closeHosp();
            render();
        }

        function closeHosp() {
            document.getElementById('hosp-selector').style.display = 'none';
        }

        const saved = localStorage.getItem('hm_v28');
        if(saved) m_data = JSON.parse(saved);
        render();
    </script>
</body>
</html>
