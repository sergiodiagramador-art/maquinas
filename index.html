<!DOCTYPE html>
<html lang='pt-br'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no'>
    <title>Logística v2.9 - AZULÃO</title>
    <style>
        body { font-family: sans-serif; background: #0056b3; margin: 0; padding-bottom: 70px; color: white; text-align: center; overflow: hidden; }
        header { background: #004494; padding: 15px; font-weight: bold; font-size: 20px; border-bottom: 2px solid rgba(255,255,255,0.2); }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; padding: 15px; height: 80vh; overflow-y: auto; }
        .card { background: #28a745; color: white; padding: 22px 2px; border-radius: 12px; font-weight: bold; font-size: 24px; box-shadow: 0 4px 8px rgba(0,0,0,0.4); border: 2px solid rgba(255,255,255,0.2); }
        .card.rua { background: #fd7e14; }
        .card.hosp { background: white; color: #0056b3; border: 3px solid #0056b3; }
        .card.manut { background: #dc3545; }
        .card small { display: block; font-size: 11px; margin-top: 6px; font-weight: normal; text-transform: uppercase; }
        
        /* Seletor de Hospitais - Ocupa a tela toda quando ativo */
        #hosp-selector { 
            display: none; 
            position: fixed; 
            top: 0; left: 0; width: 100%; height: 100%; 
            background: #f8f9fa; color: #333; z-index: 999; 
            overflow-y: auto; padding: 0; 
        }
        .h-header { background: #004494; color: white; padding: 20px; font-weight: bold; font-size: 18px; position: sticky; top: 0; }
        .h-option { padding: 20px; border-bottom: 1px solid #ddd; text-align: left; font-size: 18px; font-weight: bold; background: white; }
        .h-option:active { background: #e9ecef; }
        .btn-cancel { width: 100%; padding: 20px; background: #dc3545; color: white; border: none; font-weight: bold; font-size: 16px; }
    </style>
</head>
<body>
    <header>LOGÍSTICA v2.9 - AZULÃO</header>
    
    <div id='v-m' class='view active'>
        <div id='grid' class='grid'></div>
    </div>

    <!-- LISTA DE HOSPITAIS OCULTA QUE APARECE AO TOCAR -->
    <div id='hosp-selector'>
        <div class='h-header'>SELECIONE O HOSPITAL:</div>
        <div id='options'></div>
        <button class='btn-cancel' onclick='closeHosp()'>❌ CANCELAR</button>
    </div>

    <script>
        // Lista Raiz Fixa
        const HOSPITAIS = [
            'Nossa Saúde', 'Hospital das Nações', 'Hospital Erasto Gaertner', 
            'Hospital Erastinho', 'Hospital Pilar', 'Hospital Marcelino Champagnat', 
            'Hospital do Trabalhador', 'Hospital INC Ecoville', 'Hospital Santa Cruz', 
            'Hospital Sugisawa', 'Hospital de Clínicas', 'Hospital Evangélico', 
            'Hospital São Vicente', 'Hospital IPO', 'Hospital Vita Batel'
        ].sort();

        const STATES = ['base', 'rua', 'hosp', 'manut'];
        let machines = Array.from({length: 18}, (_, i) => ({id: i+1, s: 'base', h: ''}));
        let targetMachineId = null;

        function render() {
            const container = document.getElementById('grid');
            container.innerHTML = machines.map(m => 
                '<div class="card '+m.s+'" onclick="handleTap('+m.id+')">'+m.id+'<br><small>'+(m.h||m.s.toUpperCase())+'</small></div>'
            ).join('');
            localStorage.setItem('hm_v29_stable', JSON.stringify(machines));
        }

        function handleTap(id) {
            const m = machines.find(x => x.id === id);
            let currentIdx = STATES.indexOf(m.s);
            let nextState = STATES[(currentIdx + 1) % STATES.length];
            
            if(nextState === 'hosp') {
                targetMachineId = id;
                showHospList();
            } else {
                m.s = nextState;
                m.h = '';
                render();
            }
        }

        function showHospList() {
            const listDiv = document.getElementById('options');
            listDiv.innerHTML = HOSPITAIS.map(h => 
                '<div class="h-option" onclick="confirmHosp(\''+h+'\')">'+h+'</div>'
            ).join('');
            document.getElementById('hosp-selector').style.display = 'block';
        }

        function confirmHosp(name) {
            const m = machines.find(x => x.id === targetMachineId);
            m.s = 'hosp';
            m.h = name;
            closeHosp();
            render();
        }

        function closeHosp() {
            document.getElementById('hosp-selector').style.display = 'none';
            targetMachineId = null;
        }

        // Carregar dados salvos
        const saved = localStorage.getItem('hm_v29_stable');
        if(saved) machines = JSON.parse(saved);
        render();
    </script>
</body>
</html>
