<!DOCTYPE html>
<html lang='pt-br'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no'>
    <title>SOS RIM 3.8</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; margin: 0; padding: 10px; color: #333; text-align: center; }
        header { background: #004494; color: white; padding: 10px; font-weight: bold; margin: -10px -10px 10px -10px; border-bottom: 3px solid #ffcc00; }
        .list { display: flex; flex-direction: column; gap: 8px; }
        .row { background: white; border: 1px solid #ddd; border-radius: 8px; display: flex; align-items: center; padding: 10px; }
        .num { background: #004494; color: white; width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; margin-right: 10px; }
        .info { flex-grow: 1; text-align: left; }
        .name { font-weight: bold; font-size: 16px; }
        .status { font-size: 12px; color: #666; }
        .btn { padding: 8px 15px; border-radius: 5px; border: none; font-weight: bold; }
        .b-base { background: #28a745; color: white; }
        .b-hosp { background: #fd7e14; color: white; }
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 1000; overflow-y: auto; }
        .opt { padding: 18px; border-bottom: 1px solid #eee; text-align: left; font-size: 18px; font-weight: bold; }
    </style>
</head>
<body>
    <header>SOS RIM v3.8 - ESTÁVEL</header>
    <div class='list' id='list'></div>
    <div id='modal'>
        <div style='background:#004494; color:white; padding:20px; font-weight:bold; display:flex; justify-content:space-between;'>SELECIONE <span onclick='closeM()'>✖</span></div>
        <div class='opt' style='background:#28a745; color:white;' onclick='setH("BASE")'>VOLTAR PARA BASE</div>
        <div class='opt' style='background:#fd7e14; color:white;' onclick='setH("RUA (FORA)")'>RUA (FORA)</div>
        <div id='h-opts'></div>
    </div>
    <script>
        const HOSP = ["Cl\u00ednicas", "Erastinho", "Erasto", "Evang\u00e9lico", "INC", "IPO", "Marcelino", "Na\u00e7\u00f5es", "Nossa Sa\u00fade", "Pilar", "Santa Cruz", "Sugisawa", "S\u00e3o Vicente", "Vita", "Yoshimi"];
        let state = Array.from({length: 18}, (_, i) => ({id: i+1, h: 'BASE'}));
        let active = null;
        function render() {
            document.getElementById('list').innerHTML = state.map(m => {
                let cls = m.h === 'BASE' ? 'b-base' : 'b-hosp';
                return '<div class="row"><div class="num">'+m.id+'</div><div class="info"><div class="name">Máquina '+m.id+'</div><div class="status">📍 '+m.h+'</div></div><button class="btn '+cls+'" onclick="openM('+m.id+')">MUDAR</button></div>';
            }).join('');
            localStorage.setItem('sos_v38', JSON.stringify(state));
        }
        function openM(id) { active = id; document.getElementById('modal').style.display = 'block'; }
        function closeM() { document.getElementById('modal').style.display = 'none'; }
        function setH(h) { state[active-1].h = h; closeM(); render(); }
        document.getElementById('h-opts').innerHTML = HOSP.map(h => '<div class="opt" onclick="apply(\''+h+'\')">'+h+'</div>').join('');
        function apply(h) { setH(h); }
        const s = localStorage.getItem('sos_v38'); if(s) state = JSON.parse(s); render();
    </script>
</body>
</html>
