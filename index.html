<!DOCTYPE html>
<html lang='pt-br'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>Logística v2.5 - DIAGNÓSTICO</title>
    <style>
        body { font-family: sans-serif; background: #0056b3; color: white; text-align: center; margin: 0; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .card { background: #28a745; padding: 20px 5px; border-radius: 8px; font-weight: bold; font-size: 20px; box-shadow: 0 4px 8px rgba(0,0,0,0.3); }
        .card.rua { background: #fd7e14; }
        .card.hosp { background: white; color: #0056b3; }
        .card.manut { background: #dc3545; }
        .status-info { margin-bottom: 20px; background: white; color: #333; padding: 10px; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body>
    <div class='status-info'>v2.5: TOQUE NAS MÁQUINAS PARA MUDAR</div>
    <div id='grid' class='grid'></div>

    <script>
        // 1. Limpeza de Service Workers (Causa comum de travamento)
        if('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(regs => {
                for(let reg of regs) reg.unregister();
            });
        }

        // 2. Estado simples (Sem carregar do celular)
        let machines = Array.from({length: 18}, (_, i) => ({id: i+1, s: 'base'}));
        const states = ['base', 'rua', 'hosp', 'manut'];

        function render() {
            const container = document.getElementById('grid');
            container.innerHTML = machines.map(m => 
                '<div class="card '+m.s+'" onclick="proximo('+m.id+')">'+m.id+'<br><small>'+m.s.toUpperCase()+'</small></div>'
            ).join('');
        }

        function proximo(id) {
            const m = machines.find(x => x.id === id);
            let idx = states.indexOf(m.s);
            m.s = states[(idx + 1) % states.length];
            render();
        }

        render();
        console.log('v2.5 Rodando');
    </script>
</body>
</html>
