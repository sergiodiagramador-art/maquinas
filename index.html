<!DOCTYPE html>
<html lang='pt-br'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no'>
    <title>Logística v3.2 - 1784646589</title>
    <style>
        body { font-family: sans-serif; background: #0056b3; margin: 0; color: white; text-align: center; overflow: hidden; }
        header { background: #004494; padding: 10px; font-weight: bold; font-size: 18px; border-bottom: 2px solid rgba(255,255,255,0.2); display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; }
        .control-bar { background: #f8f9fa; padding: 10px; display: flex; gap: 8px; justify-content: center; border-bottom: 1px solid #ddd; }
        .btn-lote { flex: 1; padding: 12px 5px; border: none; border-radius: 6px; font-weight: bold; color: white; font-size: 12px; text-transform: uppercase; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 10px; height: 70vh; overflow-y: auto; }
        .card { background: #28a745; color: white; padding: 20px 2px; border-radius: 12px; font-weight: bold; font-size: 22px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); border: 2px solid rgba(255,255,255,0.2); }
        .card.rua { background: #fd7e14; }
        .card.hosp { background: white; color: #0056b3; border: 3px solid #0056b3; }
        .card.manut { background: #dc3545; }
        .card small { display: block; font-size: 10px; margin-top: 5px; font-weight: normal; text-transform: uppercase; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #f8f9fa; color: #333; z-index: 1000; overflow-y: auto; text-align: left; }
        .modal-h { background: #004494; color: white; padding: 20px; font-weight: bold; font-size: 18px; position: sticky; top: 0; display: flex; justify-content: space-between; }
        .opt { padding: 18px; border-bottom: 1px solid #ddd; font-size: 16px; font-weight: bold; background: white; }
        .qty-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 20px; }
        .qty-btn { padding: 15px; background: #0056b3; color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 18px; }
    </style>
</head>
<body>
    <header>
        <span>v3.2 AZULÃO</span>
        <span id='disp-driver' onclick='openDriver()' style='background:rgba(255,255,255,0.2); padding:5px 10px; border-radius:5px; font-size:12px;'>👤 Sérgio</span>
    </header>
    <div class='control-bar'>
        <button class='btn-lote' style='background:#fd7e14;' onclick='openLote("retirar")'>⬆️ Retirar Lote</button>
        <button class='btn-lote' style='background:#0056b3;' onclick='openLote("inserir")'>⬇️ Inserir Lote</button>
    </div>
    <div id='grid' class='grid'></div>
    <div id='modal-driver' class='modal'><div class='modal-h'>MOTORISTA <span onclick='closeM("modal-driver")'>✖</span></div><div class='opt' onclick='setDriver("Sérgio")'>Sérgio</div><div class='opt' onclick='setDriver("Jairo")'>Jairo</div><div class='opt' onclick='setDriver("Aderildo")'>Aderildo</div></div>
    <div id='modal-qty' class='modal'><div class='modal-h'>QUANTIDADE <span onclick='closeM("modal-qty")'>✖</span></div><div class='qty-grid' id='qty-options'></div></div>
    <div id='modal-dest' class='modal'><div class='modal-h'>PARA ONDE? <span onclick='closeM("modal-dest")'>✖</span></div><div class='opt' style='background:#fd7e14; color:white;' onclick='setDest("RUA", "rua")'>RUA</div><div id='hosp-options'></div></div>
    <script>
        const HOSPITAIS = ['Nossa Saúde', 'Nações', 'Erasto', 'Erastinho', 'Pilar', 'Marcelino', 'Trabalhador', 'INC', 'Santa Cruz', 'Sugisawa', 'Clínicas', 'Evangélico', 'São Vicente', 'IPO', 'Vita'].sort();
        const STATES = ['base', 'rua', 'hosp', 'manut'];
        let state = { m: Array.from({length: 18}, (_, i) => ({id: i+1, s: 'base', h: ''})), d: 'Sérgio' };
        let batchType = '', batchQty = 0;
        function render() {
            document.getElementById('grid').innerHTML = state.m.map(m => '<div class="card '+m.s+'" onclick="tapM('+m.id+')">'+m.id+'<br><small>'+(m.h||m.s.toUpperCase())+'</small></div>').join('');
            document.getElementById('disp-driver').innerText = '👤 ' + state.d;
            localStorage.setItem('hm_v32_stable', JSON.stringify(state));
        }
        function tapM(id) {
            const m = state.m.find(x => x.id === id);
            let next = STATES[(STATES.indexOf(m.s) + 1) % STATES.length];
            if(next === 'hosp') { batchType = 'single'; batchQty = id; openDest(); }
            else { m.s = next; m.h = ''; render(); }
        }
        function openDriver() { document.getElementById('modal-driver').style.display='block'; }
        function setDriver(n) { state.d=n; closeM('modal-driver'); render(); }
        function openLote(type) { batchType = type; const container = document.getElementById('qty-options'); container.innerHTML = [1,2,3,4,5,6,10,18].map(n => '<button class="qty-btn" onclick="setQty('+n+')">'+n+'</button>').join(''); document.getElementById('modal-qty').style.display='block'; }
        function setQty(n) { batchQty = n; closeM('modal-qty'); if(batchType === 'retirar') openDest(); else execLote('base', ''); }
        function openDest() { const container = document.getElementById('hosp-options'); container.innerHTML = HOSPITAIS.map(h => '<div class="opt" onclick="setDest(\''+h+'\', \'hosp\')">'+h+'</div>').join(''); document.getElementById('modal-dest').style.display='block'; }
        function setDest(hName, sType) { if(batchType === 'single') { const m = state.m.find(x => x.id === batchQty); m.s = sType; m.h = (sType==='hosp'?hName:''); } else { execLote(sType, hName); } closeM('modal-dest'); render(); }
        function execLote(sType, hName) { let count = 0; state.m.forEach(m => { if(batchType === 'retirar' && m.s === 'base' && count < batchQty) { m.s = sType; m.h = (sType==='hosp'?hName:''); count++; } else if(batchType === 'inserir' && m.s !== 'base' && count < batchQty) { m.s = 'base'; m.h = ''; count++; } }); render(); }
        function closeM(id) { document.getElementById(id).style.display='none'; }
        const saved = localStorage.getItem('hm_v32_stable'); if(saved) state = JSON.parse(saved); render();
    </script>
</body>
</html>
