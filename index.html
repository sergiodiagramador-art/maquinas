<!DOCTYPE html>
<html lang='pt-br'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no'>
    <title>AZULÃO NEXT v1.2</title>
    <style>
        body { font-family: sans-serif; background: #001f3f; margin: 0; color: white; text-align: center; overflow: hidden; }
        header { background: #001529; padding: 15px; font-weight: bold; border-bottom: 4px solid #ffcc00; }
        .release-time { font-size: 11px; color: #ffcc00; margin-top: 5px; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 10px; height: 65vh; overflow-y: auto; }
        .m { background: #28a745; padding: 25px 2px; border-radius: 10px; font-weight: bold; font-size: 24px; border: 2px solid white; }
        .m.rua { background: #ff851b; }
        .m.hosp { background: #ffffff; color: #001f3f; border: 4px solid #001f3f; }
        .m.manut { background: #ff4136; }
        .m small { display: block; font-size: 10px; margin-top: 5px; text-transform: uppercase; font-weight: bold; }
        .controls { background: #ffffff; padding: 15px; color: #333; position: fixed; bottom: 0; width: 100%; box-sizing: border-box; border-top: 4px solid #001529; z-index: 100; }
        .driver-info { font-size: 12px; font-weight: bold; margin-bottom: 8px; color: #001f3f; text-align: left; display: flex; justify-content: space-between; }
        select { width: 100%; padding: 15px; font-size: 18px; border-radius: 8px; border: 2px solid #001529; font-weight: bold; background: #f1f1f1; margin-bottom: 10px; }
        .lote-bar { display: flex; gap: 8px; }
        .btn-lote { flex: 1; padding: 12px; border: none; border-radius: 6px; color: white; font-weight: bold; font-size: 12px; text-transform: uppercase; }
    </style>
</head>
<body>
    <header>AZULÃO NEXT v1.2<div class='release-time'>LIBERADO EM: 12:45</div></header>
    <div id='grid' class='grid'></div>
    <div class='controls'>
        <div class='driver-info'><span>👤 MOTORISTA: <span id='cur-driver' style='color: #d35400;'>SÉRGIO</span></span><span onclick='toggleDriver()' style='text-decoration: underline; color: #007bff;'>Trocar</span></div>
        <select id='h-select'><option value=''>-- SELECIONE O HOSPITAL --</option><option>Erasto Gaertner</option><option>Erastinho</option><option>Marcelino</option><option>Nossa Saúde</option><option>Nações</option><option>Pilar</option><option>Trabalhador</option><option>INC Ecoville</option><option>Santa Cruz</option><option>Sugisawa</option><option>Clínicas</option><option>Evangélico</option><option>São Vicente</option><option>IPO</option><option>Vita Batel</option></select>
        <div class='lote-bar'><button class='btn-lote' style='background:#ff851b;' onclick="execLote('rua')">⬆️ Lote Rua</button><button class='btn-lote' style='background:#28a745;' onclick="execLote('base')">⬇️ Volta Base</button></div>
    </div>
    <script>
        let state = { m: Array.from({length: 18}, (_, i) => ({id: i+1, s: 'base', h: ''})), d: 'SÉRGIO' };
        const states = ['base', 'rua', 'hosp', 'manut'];
        const drivers = ['SÉRGIO', 'JAIRO', 'ADERILDO'];
        function render() {
            document.getElementById('grid').innerHTML = state.m.map(m => { let label = m.h || m.s.toUpperCase(); return '<div class="m '+m.s+'" onclick="cycle('+m.id+')">'+m.id+'<small>'+label+'</small></div>'; }).join('');
            document.getElementById('cur-driver').innerText = state.d;
            localStorage.setItem('azulao_next_v1_2', JSON.stringify(state));
        }
        function cycle(id) {
            let m = state.m.find(x => x.id === id);
            let nextState = states[(states.indexOf(m.s) + 1) % states.length];
            if(nextState === 'hosp') { let h = document.getElementById('h-select').value; if(!h) { alert('SELECIONE O HOSPITAL NA LISTA BRANCA!'); return; } m.h = h; } else { m.h = ''; }
            m.s = nextState; render();
        }
        function execLote(target) {
            let n = prompt('Quantas máquinas mover?'); if(!n || isNaN(n)) return;
            let count = 0; let h = document.getElementById('h-select').value;
            state.m.forEach(m => { if(count < n) { if(target === 'rua' && m.s === 'base') { m.s = h ? 'hosp' : 'rua'; m.h = h; count++; } else if(target === 'base' && m.s !== 'base') { m.s = 'base'; m.h = ''; count++; } } });
            render();
        }
        function toggleDriver() { state.d = drivers[(drivers.indexOf(state.d) + 1) % drivers.length]; render(); }
        const saved = localStorage.getItem('azulao_next_v1_2'); if(saved) state = JSON.parse(saved); render();
    </script>
</body>
</html>
