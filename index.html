<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SOS RIM - Logística</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #1a73e8; --google-gray: #5f6368; --danger: #d93025; --success: #1e8e3e; --bg: #f1f3f4; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: var(--bg); color: #202124; padding-bottom: 80px; }
        header { background: white; padding: 16px; display: flex; flex-direction: column; align-items: center; border-bottom: 1px solid #dadce0; position: sticky; top: 0; z-index: 100; box-shadow: 0 1px 2px rgba(60,64,67,0.3); }
        header h1 { font-size: 20px; color: var(--primary); font-weight: 500; }
        #headerSub { font-size: 13px; color: var(--google-gray); margin-top: 4px; }
        .banner-alert { background: var(--danger); color: white; padding: 10px; text-align: center; font-weight: 500; display: none; animation: blink 1.5s infinite; font-size: 14px; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
        .view { display: none; padding: 16px; }
        .view.active { display: block; }
        .machine-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .machine-card { background: white; border-radius: 12px; padding: 16px; text-align: center; border: 1px solid #dadce0; position: relative; min-height: 100px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .machine-card h3 { font-size: 18px; color: #3c4043; }
        .machine-card p { font-size: 11px; color: #70757a; }
        .machine-card.status-hospital { border-left: 6px solid var(--danger); }
        .machine-card.status-base { border-left: 6px solid var(--success); }
        .machine-card.vencida { border: 2px solid var(--danger); background: #fce8e6; }
        .badge-liberada { position: absolute; top: 0; right: 0; background: var(--danger); color: white; font-size: 9px; padding: 2px 6px; border-bottom-left-radius: 8px; font-weight: bold; }
        .hosp-list { display: flex; flex-direction: column; gap: 12px; }
        .hosp-item { background: white; border-radius: 12px; padding: 16px; border: 1px solid #dadce0; display: flex; justify-content: space-between; align-items: center; }
        .hosp-info h4 { font-size: 15px; color: #3c4043; }
        .hosp-count { background: var(--primary); color: white; border-radius: 50%; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; font-size: 12px; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: white; display: flex; height: 64px; border-top: 1px solid #dadce0; z-index: 1000; }
        .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--google-gray); border: none; background: none; gap: 4px; }
        .nav-btn.active { color: var(--primary); }
        .driver-selector { width: 100%; background: white; border-radius: 8px; border: 1px solid #dadce0; padding: 12px; margin-bottom: 16px; font-size: 15px; }
    </style>
</head>
<body>
    <div class="banner-alert" id="alertBanner">⚠️ MÁQUINAS VENCIDAS!</div>
    <header><h1>SOS RIM</h1><div id="headerSub">Gestão Logística</div></header>
    <div id="view-home" class="view active">
        <select id="driverSelect" class="driver-selector" onchange="updateDriver()">
            <option value="">Selecione o Motorista</option>
            <option value="Sérgio">Sérgio</option>
            <option value="Motorista 2">Motorista 2</option>
        </select>
        <div id="machineGrid" class="machine-grid"></div>
    </div>
    <div id="view-hosp" class="view">
        <div id="hospitalList" class="hosp-list"></div>
    </div>
    <div id="view-config" class="view">
        <div class="hosp-item" style="flex-direction:column; align-items:flex-start; gap:10px;">
            <h4>Configurações</h4><p>v2.1 - Estável</p>
            <button style="width:100%; padding:10px; color:red;" onclick="localStorage.clear(); location.reload();">Reset Total</button>
        </div>
    </div>
    <nav class="nav-bar">
        <button id="btn-home" class="nav-btn active" onclick="showView('home')"><i class="fas fa-th-large"></i><span>Máquinas</span></button>
        <button id="btn-hosp" class="nav-btn" onclick="showView('hosp')"><i class="fas fa-hospital"></i><span>Hospitais</span></button>
        <button id="btn-config" class="nav-btn" onclick="showView('config')"><i class="fas fa-sliders"></i><span>Ajustes</span></button>
    </nav>
    <script>
        var state = JSON.parse(localStorage.getItem('hm_state')) || {
            machines: Array.from({length: 18}, (_, i) => ({ id: i + 1, status: 'base', hosp: '', lib: false, prazo: null })),
            hospitals: ['Hospital Erasto Gaertner', 'Hospital Erastinho', 'Hospital Pilar', 'Hospital Nossa Sra. Graças', 'Champagnat', 'INC Ecoville', 'Cruz Vermelha', 'Santa Casa', 'Hospital do Trabalhador', 'Hospital Cajuru', 'Evangélico Mackenzie', 'Pequeno Príncipe', 'Hospital das Clínicas', 'Hospital São Lucas', 'Santa Cruz', 'Madalena Sofia', 'Vita BR', 'Vita Batel', 'Reabilitação', 'Yoshimi (Bairro Alto)']
        };
        function save() { localStorage.setItem('hm_state', JSON.stringify(state)); }
        function showView(viewId) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('view-' + viewId).classList.add('active');
            document.getElementById('btn-' + viewId).classList.add('active');
            if(viewId === 'home') renderMachines();
            if(viewId === 'hosp') renderHospitals();
        }
        function updateDriver() {
            document.getElementById('headerSub').innerText = document.getElementById('driverSelect').value || 'Gestão Logística';
        }
        function renderMachines() {
            var grid = document.getElementById('machineGrid');
            var now = new Date().getTime();
            var alert = false;
            grid.innerHTML = state.machines.map(m => {
                var isVencida = m.lib && m.prazo && now > new Date(m.prazo).getTime();
                if(isVencida) alert = true;
                return '<div class="machine-card status-'+m.status+' '+(isVencida ? 'vencida' : '')+'" onclick="actionMachine('+m.id+')">' +
                       (m.lib ? '<div class="badge-liberada">LIB</div>' : '') +
                       '<h3>'+m.id+'</h3><p>'+(m.hosp || 'Na Base')+'</p></div>';
            }).join('');
            document.getElementById('alertBanner').style.display = alert ? 'block' : 'none';
        }
        function renderHospitals() {
            document.getElementById('hospitalList').innerHTML = state.hospitals.map(h => {
                var count = state.machines.filter(m => m.hosp === h).length;
                return '<div class="hosp-item"><div class="hosp-info"><h4>'+h+'</h4><p>'+count+' máquinas</p></div>' +
                       (count > 0 ? '<div class="hosp-count">'+count+'</div>' : '') + '</div>';
            }).join('');
        }
        function actionMachine(id) {
            var m = state.machines.find(x => x.id === id);
            if(m.status === 'base') {
                var h = prompt("Para qual Hospital vai a máquina "+id+"?");
                if(h) { m.status = 'hospital'; m.hosp = h; save(); renderMachines(); }
            } else {
                if(confirm("Máquina "+id+" voltou para BASE?")) {
                    m.status = 'base'; m.hosp = ''; m.lib = false; m.prazo = null;
                } else if(confirm("Marcar como LIBERADA?")) {
                    var hora = prompt("Horário de recolha? (Ex: 15:00)");
                    if(hora) {
                        var d = new Date();
                        var p = new Date(d.getFullYear(), d.getMonth(), d.getDate(), hora.split(':')[0], hora.split(':')[1]);
                        m.lib = true; m.prazo = p.toISOString();
                    }
                }
                save(); renderMachines();
            }
        }
        renderMachines();
    </script>
</body>
</html>
