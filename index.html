<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEBUG LOGÍSTICA</title>
    <style>
        body { font-family: sans-serif; background: #0056b3; color: white; text-align: center; padding: 20px; }
        .machine { background: white; color: #0056b3; display: inline-block; width: 60px; height: 60px; margin: 5px; line-height: 60px; border-radius: 8px; font-weight: bold; font-size: 20px; }
        .status-box { background: rgba(255,255,255,0.1); padding: 10px; margin-bottom: 20px; border-radius: 8px; }
    </style>
</head>
<body>
    <h1>TESTE DE CONEXÃO</h1>
    <div class="status-box">Se você está vendo este fundo azul e números brancos abaixo, a conexão está funcionando.</div>
    <div id="grid"></div>
    <script>
        const grid = document.getElementById('grid');
        for(let i=1; i<=18; i++) {
            grid.innerHTML += `<div class="machine">${i}</div>`;
        }
    </script>
</body>
</html>
