<!DOCTYPE html>
<html lang='pt-br'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no'>
    <title>AZULÃO PRO v1.4</title>
    <style>
        body { font-family: sans-serif; background: #004080; margin: 0; color: white; text-align: center; overflow: hidden; }
        header { background: #002b55; padding: 10px 15px; border-bottom: 3px solid #ffcc00; display: flex; justify-content: space-between; align-items: center; }
        .version { font-size: 10px; color: #ffcc00; display: block; }
        .driver-box { background: rgba(255,255,255,0.1); padding: 5px 10px; border-radius: 5px; font-size: 12px; }
        .action-bar { background: #f4f4f4; padding: 10px; display: flex; gap: 8px; border-bottom: 1px solid #ccc; }
        .btn-action { flex: 1; padding: 12px 5px; border: none; border-radius: 6px; color: white; font-weight: bold; font-size: 11px; text-transform: uppercase; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; padding: 15px; height: 70vh; overflow-y: auto; }
        .card { background: #28a745; color: white; padding: 25px 2px; border-radius: 12px; font-weight: bold; font-size: 24px; border: 2px solid rgba(255,255,255,0.3); }
        .card.rua { background: #fd7e14; }
        .card.hosp { background: #ffffff; color: #004080; border: 3px solid #004080; }
        .card.manut { background: #dc3545; }
        .card small { display: block; font-size: 10px; margin-top: 6px; font-weight: normal; text-transform: uppercase; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #ffffff; color: #333; z-index: 9999; overflow-y: auto; }
        .modal-header { background: #002b55; color: white; padding: 20px; font-weight: bold; font-size: 18px; display: flex; justify-content: space-between; position: sticky; top: 0; }
        .modal-opt { padding: 20px; border-bottom: 1px solid #eee; font-size: 18px; font-weight: bold; text-align: left; }
    </style>
</head>
<body>
    <header>
        <div><span style='font-size:18px;'>AZULÃO PRO</span><span class='version'>v1.4 - AGORA VAI!</span></div>
        <div class='driver-box' onclick='openModal("modal-driver")'>👤 <span id='txt-driver'>SÉRGIO</span></div>
    </header>
    <div class='action-bar'>
        <button class='btn-action' style='background:#fd7e14;' onclick='startLote("retirar")'>⬆️ RETIRAR LOTE</button>
        <button class='btn-action' style='background:#004080;' onclick='startLote("inserir")'>⬇️ VOLTA BASE</button>
    </div>
    <div id='grid' class='grid'></div>
    <div id='modal-driver' class='modal'>
        <div class='modal-header'>MOTORISTA <span onclick='closeModal("modal-driver")'>✖</span></div>
        <div class='modal-opt' onclick='setDriver("SÉRGIO")'>SÉRGIO</div>
        <div class='modal-opt' onclick='setDriver("JAIRO")'>JAIRO</div>
    </div>
    <div id='modal-qty' class='modal'>
        <div class='modal-header'>QUANTAS MÁQUINAS? <span onclick='closeModal("modal-qty")'>✖</span></div>
        <div style='display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:20px;' id='qty-opts'></div>
    </div>
    <div id='modal-hosp' class='modal'>
        <div class='modal-header'>DESTINO <span onclick='closeModal("modal-hosp")'>✖</span></div>
        <div id='hosp-list'></div>
    </div>
    <script>
        const HOSPITAIS = ['Erasto', 'Erastinho', 'Nossa Saúde', 'Nações', 'Pilar', 'Marcelino', 'INC', 'Santa Cruz', 'Sugisawa', 'Vita'].sort();
        let state = { m: Array.from({length: 18}, (_, i) => ({id: i+1, s: 'base', h: ''})), d: 'SÉRGIO' };
        let bType = '', bQty = 0, bSingleId = null;
        function render() {
            document.getElementById('grid').innerHTML = state.m.map(m => { let lbl = m.h || m.s.toUpperCase(); return '<div class="card '+m.s+'" onclick="tapM('+m.id+')">'+m.id+'<small>'+lbl+'</small></div>'; }).join('');
            document.getElementById('txt-driver').innerText = state.d;
            localStorage.setItem('azulao_v14_data', JSON.stringify(state));
        }
        function tapM(id) { const m = state.m.find(x => x.id === id); const modes = ['base', 'rua', 'hosp', 'manut']; let next = modes[(modes.indexOf(m.s) + 1) % modes.length]; if(next === 'hosp') { bType = 'single'; bSingleId = id; openHosp(); } else { m.s = next; m.h = ''; render(); } }
        function startLote(t) { bType = t; document.getElementById('qty-opts').innerHTML = [1,2,3,4,5,6,10,18].map(n => '<button style="padding:20px;background:#004080;color:white;border:none;border-radius:8px;font-weight:bold;" onclick="setQty('+n+')">'+n+'</button>').join(''); openModal('modal-qty'); }
        function setQty(n) { bQty = n; closeModal('modal-qty'); if(bType === 'retirar') openHosp(); else execLote('base', ''); }
        function openHosp() { document.getElementById('hosp-list').innerHTML = HOSPITAIS.map(h => '<div class="modal-opt" onclick="applyDest(\''+h+'\', \'hosp\')">'+h+'</div>').join(''); openModal('modal-hosp'); }
        function applyDest(h, s) { if(bType === 'single') { let m = state.m.find(x => x.id === bSingleId); m.s = s; m.h = h; } else { execLote(s, h); } closeModal('modal-hosp'); render(); }
        function execLote(s, h) { let c = 0; state.m.forEach(m => { if(c < bQty) { if(bType === 'retirar' && m.s === 'base') { m.s = s; m.h = h; c++; } else if(bType === 'inserir' && m.s !== 'base') { m.s = 'base'; m.h = ''; c++; } } }); }
        function setDriver(n) { state.d = n; closeModal('modal-driver'); render(); }
        function openModal(id) { document.getElementById(id).style.display = 'block'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        const saved = localStorage.getItem('azulao_v14_data'); if(saved) state = JSON.parse(saved); render();
    </script>
</body>
</html>
